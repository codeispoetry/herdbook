<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bgSmall" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4682B4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="url(#bgSmall)" stroke="#2F4F4F" stroke-width="1"/>
  
  <!-- Simple sheep -->
  <g fill="#FFFAF0" stroke="#D3D3D3" stroke-width="0.5">
    <!-- Body -->
    <circle cx="16" cy="18" r="6"/>
    <circle cx="12" cy="16" r="3"/>
    <circle cx="20" cy="16" r="3"/>
    <circle cx="16" cy="14" r="3"/>
  </g>
  
  <!-- Head -->
  <circle cx="16" cy="10" r="3" fill="#FFB6C1" stroke="#D3D3D3" stroke-width="0.5"/>
  
  <!-- Eyes -->
  <circle cx="15" cy="9" r="0.8" fill="#000"/>
  <circle cx="17" cy="9" r="0.8" fill="#000"/>
  <circle cx="15.3" cy="8.7" r="0.3" fill="#FFF"/>
  <circle cx="17.3" cy="8.7" r="0.3" fill="#FFF"/>
  
  <!-- Legs -->
  <g fill="#2F4F4F">
    <rect x="13" y="22" width="1.5" height="4" rx="0.5"/>
    <rect x="15" y="22" width="1.5" height="4" rx="0.5"/>
    <rect x="17" y="22" width="1.5" height="4" rx="0.5"/>
  </g>
</svg>